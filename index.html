<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOPSIDOPSI</title>

<style>

:root{
--text:#1c2330;
--muted:#5e6675;
--border:rgba(0,0,0,.12);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
text-align:center;

background:
radial-gradient(circle at 20% 20%, #dff4ff, transparent 45%),
radial-gradient(circle at 80% 20%, #ffe3ef, transparent 45%),
radial-gradient(circle at 50% 90%, #e6fff7, transparent 45%),
linear-gradient(180deg,#f6fbff,#fff6fb);
}

/* Sterne */

body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;

background:
radial-gradient(circle,#ffffff 2px,transparent 3px) 20px 30px/120px 120px,
radial-gradient(circle,#ffffff 2px,transparent 3px) 80px 90px/160px 160px,
radial-gradient(circle,#ffffff 2px,transparent 3px) 140px 40px/200px 200px;

opacity:.6;
}

.container{
width:min(720px,100%);
background:white;
border-radius:28px;
padding:40px 30px;
box-shadow:0 25px 70px rgba(0,0,0,.15);
}

/* Logo */

.logo{
width:300px;
max-width:90%;
margin:auto;
display:block;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

h1{
margin:18px 0 10px;
font-size:28px;
color:var(--text);
}

p{
color:var(--muted);
max-width:520px;
margin:auto;
line-height:1.5;
}

/* Social Links */

.links{
margin-top:28px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

@media(max-width:520px){
.links{grid-template-columns:1fr;}
}

/* Buttons */

.link{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:16px;
border:1px solid var(--border);
background:white;
text-decoration:none;
color:var(--text);
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.icon{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:#f5f5f5;
font-size:20px;
}

.text{
display:flex;
flex-direction:column;
text-align:left;
}

.title{
font-weight:700;
font-size:16px;
}

.desc{
font-size:13px;
color:var(--muted);
}

/* größerer YouTube Button */

.youtube{
grid-column:span 2;
background:#fff5f5;
border:2px solid #ffd6d6;
}

@media(max-width:520px){
.youtube{grid-column:span 1;}
}

.disabled{
opacity:.5;
pointer-events:none;
}

/* Mascot */

.mascotBox{
margin:35px auto 10px;
width:260px;
height:260px;
overflow:hidden;
border-radius:22px;
border:1px solid var(--border);
}

.mascotBox img{
width:600%;
position:relative;
left:-5%;
top:-2%;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

/* Footer */

footer{
margin-top:20px;
font-size:12px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<h1>Kinderlieder • Lernen • Lachen</h1>

<p>
Hier findest du die offiziellen HOPSIDOPSI Links zu unseren Social-Media-Kanälen.
</p>

<div class="links">

<a class="link youtube" href="https://www.youtube.com/@hopsidopsi" target="_blank">
<div class="icon">▶️</div>
<div class="text">
<div class="title">YouTube</div>
<div class="desc">@hopsidopsi</div>
</div>
</a>

<a class="link" href="https://www.instagram.com/hopsidopside/" target="_blank">
<div class="icon">📸</div>
<div class="text">
<div class="title">Instagram</div>
<div class="desc">@hopsidopside</div>
</div>
</a>

<a class="link" href="https://www.tiktok.com/@hopsidopsi.de" target="_blank">
<div class="icon">🎵</div>
<div class="text">
<div class="title">TikTok</div>
<div class="desc">@hopsidopsi.de</div>
</div>
</a>

<div class="link disabled">
<div class="icon">🎧</div>
<div class="text">
<div class="title">Spotify</div>
<div class="desc">kommt bald</div>
</div>
</div>

</div>

<div class="mascotBox">
<img src="mascots.png">
</div>

<footer>
© <span id="year"></span> HOPSIDOPSI
</footer>

</div>

<script>

/* Jahr */

document.getElementById("year").textContent=new Date().getFullYear();

/* Rechtsklick deaktivieren */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* Drag verhindern */

document.addEventListener("dragstart",e=>e.preventDefault());

</script>

</body>
</html>
