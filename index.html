<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOPSIDOPSI</title>

<style>

:root{
--bg1:#f6fbff;
--bg2:#fff6fb;
--text:#132033;
--muted:#5b6472;
--border:rgba(19,32,51,.12);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;

background:
radial-gradient(circle at 20% 20%, #cfefff, transparent 50%),
radial-gradient(circle at 80% 20%, #ffd9e6, transparent 50%),
radial-gradient(circle at 50% 90%, #d9fff4, transparent 50%),
linear-gradient(180deg,var(--bg1),var(--bg2));
}

.container{
width:min(700px,100%);
background:white;
border-radius:28px;
padding:35px 30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.12);
}

.logo{
width:260px;
max-width:80%;
margin:auto;
display:block;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

h1{
margin:15px 0 10px;
font-size:26px;
}

p{
color:var(--muted);
margin:0 auto;
max-width:520px;
line-height:1.5;
}

.links{
margin-top:25px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

@media(max-width:520px){
.links{grid-template-columns:1fr;}
}

.link{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:16px;
border:1px solid var(--border);
text-decoration:none;
color:var(--text);
background:white;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.icon{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:#f7f7f7;
}

.text{
display:flex;
flex-direction:column;
text-align:left;
}

.title{
font-weight:700;
font-size:16px;
}

.desc{
font-size:13px;
color:var(--muted);
}

.disabled{
opacity:.5;
pointer-events:none;
}

/* Mascot */

.mascotBox{
margin:30px auto 10px;
width:240px;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
}

.mascotBox img{
width:240%;
position:relative;
left:-6%;
top:-6%;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

/* Footer */

footer{
margin-top:20px;
font-size:12px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png" alt="HOPSIDOPSI Logo">

<h1>Kinderlieder • Lernen • Lachen</h1>

<p>
Hier findest du die offiziellen HOPSIDOPSI Links zu unseren Social-Media-Kanälen.
</p>

<div class="links">

<a class="link" href="https://www.youtube.com/@hopsidopsi" target="_blank">
<div class="icon">▶️</div>
<div class="text">
<div class="title">YouTube</div>
<div class="desc">@hopsidopsi</div>
</div>
</a>

<a class="link" href="https://www.instagram.com/hopsidopside/" target="_blank">
<div class="icon">📸</div>
<div class="text">
<div class="title">Instagram</div>
<div class="desc">@hopsidopside</div>
</div>
</a>

<a class="link" href="https://www.tiktok.com/@hopsidopsi.de" target="_blank">
<div class="icon">🎵</div>
<div class="text">
<div class="title">TikTok</div>
<div class="desc">@hopsidopsi.de</div>
</div>
</a>

<div class="link disabled">
<div class="icon">🎧</div>
<div class="text">
<div class="title">Spotify</div>
<div class="desc">kommt bald</div>
</div>
</div>

</div>

<div class="mascotBox">
<img src="mascots.png">
</div>

<footer>
© <span id="year"></span> HOPSIDOPSI
</footer>

</div>

<script>

/* Jahr automatisch */

document.getElementById("year").textContent = new Date().getFullYear();

/* Rechtsklick deaktivieren */

document.addEventListener("contextmenu", e => e.preventDefault());

/* Drag verhindern */

document.addEventListener("dragstart", e => e.preventDefault());

/* einige typische Speichern-Shortcuts blocken */

document.addEventListener("keydown", function(e){
if(
(e.ctrlKey && e.key === "s") ||
(e.ctrlKey && e.key === "u") ||
(e.ctrlKey && e.key === "c") ||
(e.ctrlKey && e.key === "a")
){
e.preventDefault();
}
});

</script>

</body>
</html>
